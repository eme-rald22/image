<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emmies Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <h1>My Gallery</h1>
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="nature">Nature</button>
            <button class="filter-btn" data-filter="art">Art</button>
            <button class="filter-btn" data-filter="portrait">portrait</button>
        </div>
    <div class="gallery">
    <img src="photo1.jpg" alt="Photo 1" data-category="art">
    <img src="photo2.jpg" alt="Photo 2" data-category="portrait">
    <img src="photo3.jpg" alt="Photo 3" data-category="nature">
    <img src="photo4.jpg" alt="Photo 4" data-category="nature">
    <img src="photo5.jpg" alt="Photo 5" data-category="art">
    <img src="photo6.jpg" alt="Photo 6" data-category="portrait">
    <img src="photo7.jpg" alt="Photo 7" data-category="nature">
    <img src="photo8.jpg" alt="Photo 8" data-category="art">
    <img src="photo9.jpg" alt="Photo 9" data-category="art">
    <img src="photo10.jpg" alt="Photo 10" data-category="portrait">
     <img src="photo11.jpg" alt="Photo 11" data-category="art">
    <img src="photo12.jpg" alt="Photo 12" data-category="nature">
    <img src="photo13.jpg" alt="Photo 13" data-category="portrait">
    <img src="photo14.jpg" alt="Photo 14" data-category="portrait">
    <img src="photo15.jpg" alt="Photo 15" data-category="portrait">
    <img src="photo16.jpg" alt="Photo 16" data-category="nature">
    <img src="photo17.jpg" alt="Photo 17" data-category="art">
 
    </div>
    
    <div class="lightbox" id="lightbox">
        <span class="close-btn" id="closeBtn">&times;</span>
        <button class="nav-btn" id="prevBtn">&#10094</button>
        <img id="lightboxImg" src="">
        <button class="nav-btn" id="nextBtn">&#10095</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
